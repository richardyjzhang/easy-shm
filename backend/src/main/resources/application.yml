spring:
  profiles:
    include: local

  datasource:
    druid:
      mysql:
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://localhost:3306/easy_shm?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
        username: root
        password: 123456
        initial-size: 5
        min-idle: 5
        max-active: 20
        max-wait: 30000
        validation-query: SELECT 1

      tdengine:
        driver-class-name: com.taosdata.jdbc.ws.WebSocketDriver
        url: jdbc:TAOS-WS://localhost:6041/stats_data
        username: root
        password: taosdata
        initial-size: 2
        min-idle: 2
        max-active: 10
        max-wait: 30000
        validation-query: SELECT SERVER_VERSION()

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080
